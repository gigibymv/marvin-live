<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MARVIN — Mission Control v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --paper:#F4F0EA; --bone:#EEE9DD; --bone2:#E4DDCC;
  --ink:#1A1814; --ink2:#3A362F; --ink3:#5C564C; --muted:#78716A;
  --rule:rgba(26,24,20,.10); --ruleh:rgba(26,24,20,.22);
  --green:#2D6E4E; --amber:#8B6200; --red:#B43A2E;
  --d:'Bricolage Grotesque',sans-serif;
  --g:'Geist',sans-serif;
  --m:'Geist Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:var(--g);color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--ruleh);border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes blink{0%,100%{opacity:.15}50%{opacity:1}}
</style>

<script type="text/babel" src="mc-v2/utils.jsx"></script>
<script type="text/babel" src="mc-v2/left.jsx"></script>
<script type="text/babel" src="mc-v2/center.jsx"></script>
<script type="text/babel" src="mc-v2/right.jsx"></script>
<script type="text/babel" src="mc-v2/app.jsx"></script>

<script type="text/babel">
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
